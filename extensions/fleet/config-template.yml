# Fleet orchestrator configuration
# Save to .specify/extensions/fleet/fleet-config.yml
#
# Local overrides (gitignored, never commit model choices or personal prefs):
#   .specify/extensions/fleet/fleet-config.local.yml
# Add to .gitignore: .specify/extensions/fleet/fleet-config.local.yml
#
# Config precedence (highest wins):
#   CLI flags (--skip-clarify etc.)
#   > Environment vars (FLEET_MODEL_REVIEW, FLEET_SKIP_CLARIFY etc.)
#   > fleet-config.local.yml
#   > fleet-config.yml (this file)
#   > extension defaults (extension.yml)

fleet:
  models:
    # "auto" = use whatever model is running the fleet
    primary: "auto"

    # "ask" = prompt user on first run
    # Set to a model name to use it silently: "gpt-4o", "gemini-2.0-pro", "claude-opus-4", etc.
    review: "ask"

  phases:
    # Skip Phase 2 (Clarify) automatically — or pass --skip-clarify at runtime
    skip_clarify: false

    # Skip Phase 4 (UX Research) automatically — or pass --skip-ux at runtime
    # Auto-skips when spec.md/plan.md contain no UI keywords
    skip_ux: false

    # Skip Phase 5 (Checklist) automatically — or pass --skip-checklist at runtime
    skip_checklist: false

    # Skip Phase 8 (Cross-model review) automatically — or pass --skip-review at runtime
    skip_review: false

    # Skip Phases 9+11 (Stitch Prototype/Validate) automatically — or pass --skip-stitch at runtime
    # Auto-skips when spec.md/plan.md contain no UI keywords
    skip_stitch: false

    # Skip Phase 12 (Code Review) automatically — or pass --skip-code-review at runtime
    skip_code_review: false

    # Skip Phase 13 (Release Readiness) automatically — or pass --skip-release at runtime
    skip_release: false

  qa:
    # When to run the Phase 12 code-quality pipeline
    #   per_phase: immediately after Phase 10 (Implement) — default
    #   batch_end: run once at the end of all implementation batches
    cadence: "per_phase"

    # Toggle individual code-quality pipeline stages (Phase 12)
    run_review: true     # Generate reviews/code-review.md
    run_fix: true        # Apply auto-fixes and generate reviews/code-fix-report.md
    run_validate: true   # Generate reviews/validation-report.md
    run_future: true     # Generate reviews/future-ideas.md

    # Pause Fleet if the pipeline leaves unresolved CRITICAL findings
    pause_on_critical: true

  git:
    # Legacy: WIP commit checkpoints (superseded by auto_commit)
    checkpoint_after_tasks: true
    checkpoint_after_implement: true

    # Auto-commit WIP after every artifact-producing phase (default: true)
    # When false, falls back to asking via vscode_askQuestions after Phases 6 and 10 only
    auto_commit: true

    # Auto-stash uncommitted changes before fleet run (default: true)
    # When false, uses vscode_askQuestions to ask Continue / Stash / Abort
    auto_stash: true

  context:
    # Summarize and discard full sub-agent output after each approved gate
    compact_after_phase: true

    # Suggest a fresh chat starting at this phase number (to avoid context exhaustion)
    suggest_fresh_chat_at_phase: 6

  parallelism:
    # Maximum number of concurrent subagents during Plan, Implement, and Code Review phases
    max_concurrent: 3
