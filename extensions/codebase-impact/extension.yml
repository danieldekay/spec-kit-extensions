schema_version: "1.0"

extension:
  id: "codebase-impact"
  name: "Codebase Impact Analysis"
  version: "0.1.1"
  description: "Analyzes how new or changed code interacts with the existing codebase. Produces an integration surface map, affected-feature inventory, dependency stability audit, and IMPACT-NNN task candidates for tasks.md."
  author: "danieldekay"
  repository: "https://github.com/danieldekay/spec-kit-extensions"
  license: "MIT"
  homepage: "https://github.com/danieldekay/spec-kit-extensions/tree/main/extensions/codebase-impact"

requires:
  speckit_version: ">=0.2.0"
  commands:
    - "speckit.plan"

provides:
  commands:
    - name: "speckit.codebase-impact.analyze"
      file: "commands/codebase-impact-analyze.md"
      description: "Scan the codebase for integration points, affected features, and dependency stability. Produces codebase-impact.md with IMPACT-NNN task candidates."
      aliases: ["speckit.codebase-impact.scan"]
      user-invocable: true

  config:
    - name: "codebase-impact-config.yml"
      template: "config-template.yml"
      description: "Codebase impact analysis configuration (scan directories, exclusions, risk thresholds)"
      required: false

hooks:
  after_plan:
    command: "speckit.codebase-impact.analyze"
    optional: true
    prompt: "Run codebase impact analysis to identify integration points and required changes to existing code?"
    description: "Scans the codebase for files and features affected by the planned work, producing codebase-impact.md with IMPACT-NNN task candidates."
    condition: null

tags:
  - "impact"
  - "analysis"
  - "planning"
  - "integration"
  - "codebase"
  - "regression"

changelog: "https://github.com/danieldekay/spec-kit-extensions/blob/main/extensions/codebase-impact/CHANGELOG.md"

support:
  documentation: "https://github.com/danieldekay/spec-kit-extensions/tree/main/extensions/codebase-impact/README.md"
  issues: "https://github.com/danieldekay/spec-kit-extensions/issues"

config_schema:
  type: "object"
  properties:
    codebase_impact:
      type: "object"
      properties:
        scan_depth:
          type: "string"
          enum: ["full", "shallow", "targeted"]
          default: "full"
          description: "How deeply to scan the codebase for integration points."
        scan_directories:
          type: "array"
          items:
            type: "string"
          description: "Directories to scan (relative to repo root). Empty means scan all."
        exclude_directories:
          type: "array"
          items:
            type: "string"
          description: "Directories to skip during scanning."
        risk_threshold:
          type: "string"
          enum: ["LOW", "MED", "HIGH"]
          default: "LOW"
          description: "Minimum risk level to include in the report."
        include_test_impact:
          type: "boolean"
          default: true
          description: "Whether to identify existing test files that need updates."
        include_dependency_stability:
          type: "boolean"
          default: true
          description: "Whether to audit stability of existing modules the feature depends on."
        output_format:
          type: "string"
          enum: ["markdown", "json"]
          default: "markdown"
          description: "Format for the impact report output."
