# Code quality pipeline configuration

code_quality:
  review:
    # What to check for
    include_refactoring: true
    include_tech_debt: true
    include_dead_code: true
    include_code_smells: true

    # Minimum severity to report: "low" | "medium" | "high" | "critical"
    severity_threshold: "medium"

    # Principles to check against
    principles:
      - "SOLID"
      - "DRY"
      - "YAGNI"
      - "KISS"

  fix:
    # Auto-fix minor issues without confirmation
    auto_fix_minor: true

    # Require confirmation for major fixes
    auto_fix_major: false

    # Maximum fix-recheck cycles
    max_fix_cycles: 3

  validate:
    # Check functional requirements implementation
    check_fr: true

    # Check non-functional requirements implementation
    check_nfr: true

    # Verify testability of each requirement
    check_testability: true

    # Check documentation coverage
    check_documentation: true

  future:
    # Improvement horizons: "short" | "medium" | "long" (comma-separated)
    horizon: "short,medium,long"

    # Include performance improvement ideas
    include_performance: true

    # Include scalability improvement ideas
    include_scalability: true

    # Include DX (developer experience) improvement ideas
    include_dx: true

  # ─── specfact integration ───────────────────────────────────────────────────
  specfact:
    # Project bundle ID from .specfact/projects/<id>/
    # Leave null to skip automatic specfact export (you can still run dk.code-quality.specfact-sync manually)
    project_id: null

    # CI enforcement level for the quality gate
    # observe  → report only, never fails the pipeline
    # warn     → log warnings, never fails the pipeline
    # enforce  → fail the pipeline when quality gate thresholds are not met
    enforcement_level: "observe"

    # Automatically run dk.code-quality.specfact-sync after dk.code-quality.validate
    sync_after_validate: false

    # Automatically run dk.code-quality.specfact-sync at the end of dk.code-quality.pipeline
    sync_after_pipeline: false

    # Directory where quality-export.json files are written
    export_path: ".specfact/quality-exports"

    # When the dod extension is also installed, update dod.yml criterion statuses
    # using the validation results from dk.code-quality.validate
    update_dod: true
