schema_version: "1.0"

extension:
  id: "code-quality"
  name: "Code Quality Pipeline"
  version: "0.1.1"
  description: "Post-implementation code quality pipeline: review, fix, future ideas, and FR/NFR validation with testability and documentation checks. Includes specfact integration for quality governance and DoD bridging."
  author: "danieldekay"
  repository: "https://github.com/danieldekay/spec-kit-extensions"
  license: "MIT"
  homepage: "https://github.com/danieldekay/spec-kit-extensions/tree/main/extensions/code-quality"

requires:
  speckit_version: ">=0.2.0"
  commands:
    - "speckit.implement"

provides:
  commands:
    - name: "speckit.code-quality.review"
      file: "commands/code-review.md"
      description: "Code review: identify refactoring opportunities, tech debt, dead code, and code smells"
      aliases: ["speckit.code-quality.cr"]
      user-invocable: true

    - name: "speckit.code-quality.fix"
      file: "commands/code-fix.md"
      description: "Auto-fix issues identified in the code review report"
      aliases: ["speckit.code-quality.cf"]

    - name: "speckit.code-quality.future"
      file: "commands/future-ideas.md"
      description: "Generate ideas for improving and extending the feature"
      aliases: ["speckit.code-quality.fi"]

    - name: "speckit.code-quality.validate"
      file: "commands/validate-requirements.md"
      description: "Validate FR/NFR implementation, testability, and documentation coverage"
      aliases: ["speckit.code-quality.vr"]

    - name: "speckit.code-quality.pipeline"
      file: "commands/quality-pipeline.md"
      description: "Run the full quality pipeline: review → fix → validate → future ideas → specfact sync"
      aliases: ["speckit.code-quality.all"]
      user-invocable: true

    - name: "speckit.code-quality.specfact-sync"
      file: "commands/specfact-sync.md"
      description: "Export quality findings to specfact-compatible JSON and optionally run specfact govern check for CI/CD enforcement"
      aliases: ["speckit.code-quality.sf"]
      user-invocable: true

  config:
    - name: "code-quality-config.yml"
      template: "config-template.yml"
      description: "Code quality pipeline configuration"
      required: false

hooks:
  after_implement:
    command: "speckit.code-quality.pipeline"
    optional: true
    prompt: "Run the full code quality pipeline (review → fix → validate → future ideas)?"
    description: "Comprehensive post-implementation quality check: reviews code, fixes issues, validates requirements, and generates improvement ideas"
    condition: null

tags:
  - "code-review"
  - "refactoring"
  - "quality"
  - "validation"
  - "tech-debt"
  - "dead-code"
  - "specfact"
  - "governance"
  - "definition-of-done"

changelog: "https://github.com/danieldekay/spec-kit-extensions/blob/main/extensions/code-quality/CHANGELOG.md"

support:
  issues: "https://github.com/danieldekay/spec-kit-extensions/issues"

config_schema:
  type: "object"
  properties:
    code_quality:
      type: "object"
      properties:
        review:
          type: "object"
          properties:
            include_refactoring:
              type: "boolean"
            include_tech_debt:
              type: "boolean"
            include_dead_code:
              type: "boolean"
            include_code_smells:
              type: "boolean"
            severity_threshold:
              type: "string"
              enum: ["low", "medium", "high", "critical"]
        fix:
          type: "object"
          properties:
            auto_fix_minor:
              type: "boolean"
            auto_fix_major:
              type: "boolean"
            max_fix_cycles:
              type: "integer"
              minimum: 1
              maximum: 10
        validate:
          type: "object"
          properties:
            check_fr:
              type: "boolean"
            check_nfr:
              type: "boolean"
            check_testability:
              type: "boolean"
            check_documentation:
              type: "boolean"
        future:
          type: "object"
          properties:
            horizon:
              type: "string"
              description: "Comma-separated: short, medium, long"
            include_performance:
              type: "boolean"
            include_scalability:
              type: "boolean"
            include_dx:
              type: "boolean"
        specfact:
          type: "object"
          properties:
            project_id:
              type: ["string", "null"]
              description: "specfact project bundle ID (from .specfact/projects/)"
            enforcement_level:
              type: "string"
              enum: ["observe", "warn", "enforce"]
              description: "observe: report only | warn: log warnings | enforce: fail CI"
            sync_after_validate:
              type: "boolean"
              description: "Auto-run speckit.code-quality.specfact-sync after speckit.code-quality.validate"
            sync_after_pipeline:
              type: "boolean"
              description: "Auto-run speckit.code-quality.specfact-sync at the end of speckit.code-quality.pipeline"
            export_path:
              type: "string"
              description: "Output directory for specfact-compatible quality export files"
            update_dod:
              type: "boolean"
              description: "Update dod.yml (from dod extension) with validation results when present"

defaults:
  code_quality:
    review:
      include_refactoring: true
      include_tech_debt: true
      include_dead_code: true
      include_code_smells: true
      severity_threshold: "medium"
    fix:
      auto_fix_minor: true
      auto_fix_major: false
      max_fix_cycles: 3
    validate:
      check_fr: true
      check_nfr: true
      check_testability: true
      check_documentation: true
    future:
      horizon: "short,medium,long"
      include_performance: true
      include_scalability: true
    specfact:
      project_id: null
      enforcement_level: "observe"
      sync_after_validate: false
      sync_after_pipeline: false
      export_path: ".specfact/quality-exports"
      update_dod: true
