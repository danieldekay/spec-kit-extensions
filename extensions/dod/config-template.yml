# dod-config.yml — Definition of Done extension configuration
# Place this file at: .specify/extensions/dod/dod-config.yml

dod:
  # Number of DoD criteria to generate per Functional Requirement
  # More criteria = more thorough but verbose dod.yml
  criteria_per_fr: 2

  # Default measurement methods per NFR category
  # Override per-feature if needed in dod.yml directly
  nfr_defaults:
    performance:
      method: "benchmark"        # benchmark | monitoring | manual
      tool: ""                   # e.g. "k6", "artillery", "ab"
    security:
      method: "automated"        # automated | audit | manual
      tool: "SAST"               # e.g. "Semgrep", "Bandit", "Trivy"
    accessibility:
      method: "automated"        # automated | audit | manual
      tool: "axe-core"           # e.g. "axe-core", "Lighthouse", "Pa11y"
    availability:
      method: "monitoring"       # monitoring | benchmark | manual
      tool: ""                   # e.g. "Prometheus", "Datadog"
    scalability:
      method: "benchmark"
      tool: ""
    compatibility:
      method: "automated"
      tool: ""
    maintainability:
      method: "audit"
      tool: ""

  # specfact enforcement level applied to the dod gate in CI
  # observe — report only, never fail the pipeline
  # warn    — log warnings, never fail the pipeline
  # enforce — fail the pipeline when definition_of_done gate is not passed
  enforcement_level: "observe"

  # specfact integration settings
  specfact:
    # Project bundle ID from .specfact/projects/<id>/
    # Leave null to skip specfact export
    project_id: null

    # Prefix prepended to feature IDs when tagging in specfact
    # e.g. "sk-" → specfact feature tag "sk-my-feature"
    feature_tag_prefix: "sk-"

    # Automatically run dk.dod.export after each dk.dod.validate run
    export_on_validate: false

    # Directory where dod-export.json files are written (for specfact)
    export_path: ".specfact/dod-exports"
