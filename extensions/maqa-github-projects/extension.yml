schema_version: "1.0"

extension:
  id: "maqa-github-projects"
  name: "MAQA GitHub Projects Integration"
  version: "0.1.0"
  description: "GitHub Projects v2 integration for the MAQA extension. Populates project items from specs, tracks status field, real-time task list ticking via issue body updates."
  author: "danieldekay"
  upstream_author: "GenieRobot"
  upstream_repository: "https://github.com/GenieRobot/spec-kit-maqa-github-projects"
  repository: "https://github.com/danieldekay/spec-kit-extensions"
  license: "MIT"
  homepage: "https://github.com/danieldekay/spec-kit-extensions/tree/main/extensions/maqa-github-projects"

requires:
  speckit_version: ">=0.3.0"

provides:
  commands:
    - name: "speckit.maqa-github-projects.setup"
      file: "commands/speckit.maqa-github-projects.setup.md"
      description: "Bootstrap GitHub Projects v2 config for MAQA. Reads project and status field options via GraphQL API."
      user-invocable: true

    - name: "speckit.maqa-github-projects.populate"
      file: "commands/speckit.maqa-github-projects.populate.md"
      description: "Populate GitHub Project from specs/*/tasks.md. Creates draft issues per feature with markdown task list. Skips existing. Safe to re-run."
      user-invocable: true

  config:
    - name: "maqa-github-projects/github-projects-config.yml"
      template: "config-template.yml"
      description: "GitHub Projects v2 project and field option IDs for MAQA coordination"
      required: true

tags:
  - "github"
  - "github-projects"
  - "project-management"
  - "multi-agent"
  - "maqa"

changelog: "https://github.com/danieldekay/spec-kit-extensions/blob/main/extensions/maqa-github-projects/CHANGELOG.md"

support:
  issues: "https://github.com/danieldekay/spec-kit-extensions/issues"

config_schema:
  type: "object"
  required: ["owner", "project_number", "project_id"]
  properties:
    owner:
      type: "string"
      description: "GitHub org or username"
    project_number:
      type: "string"
      description: "Project number from the URL"
    project_id:
      type: "string"
      description: "GraphQL node ID (filled by setup)"
    status_field_id:
      type: "string"
    todo_option_id:
      type: "string"
    in_progress_option_id:
      type: "string"
    in_review_option_id:
      type: "string"
    done_option_id:
      type: "string"
    linked_repo:
      type: "string"
      description: "Optional org/repo to link issues to"
